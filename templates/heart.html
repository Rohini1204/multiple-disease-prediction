<!DOCTYPE html>
<html>

<head>

 <title>Heart Prediction</title>

 <link rel="icon" type="image/png"
      href="{{ url_for('static', filename='favicon.png') }}">

 <link rel="stylesheet"
  href="{{ url_for('static', filename='common.css') }}">

 <link rel="stylesheet"
  href="{{ url_for('static', filename='heart.css') }}">

</head>

<body>

<div class="app">

<div class="sidebar">

 <h2>🩺 Healthcare AI</h2>

 <button onclick="location.href='/'">🏠 Home</button>
 <button onclick="location.href='/diabetes'">🩸 Diabetes</button>
 <button>❤️ Heart</button>
 <button onclick="location.href='/parkinsons'">🧠 Parkinson’s</button>
 <button onclick="location.href='/pcos'">🌸 PCOS</button>
 <button onclick="location.href='/kidney'">🧪 Kidney</button>
 <button onclick="location.href='/liver'">🫀 Liver</button>
 <button onclick="location.href='/thyroid'">🧣 Thyroid</button>
 <button onclick="location.href='/anemia'">🩹 Anemia</button>
 <button onclick="location.href='/autism'">🧩 Autism</button>
 <button onclick="location.href='/alzheimers'">🧠 Alzheimer’s</button>

</div>

<div class="main">

<h1>❤️ Heart Disease Prediction</h1>

<div class="card">

<div class="ref-title-wrapper">
 <div></div>
 <div></div>
 <div class="ref-title">📊 Reference Values</div>
</div>

<div class="field">
 <label>Age</label>
 <input id="h1" type="number">
 <div class="ref">18 – 80</div>
</div>

<div class="field">
 <label>Sex (0=F,1=M)</label>
 <input id="h2" type="number">
 <div class="ref">0 / 1</div>
</div>

<div class="field">
 <label>Chest Pain</label>
 <input id="h3" type="number">
 <div class="ref">0 – 3</div>
</div>

<div class="field">
 <label>Resting BP</label>
 <input id="h4" type="number">
 <div class="ref">90 – 120</div>
</div>

<div class="field">
 <label>Cholesterol</label>
 <input id="h5" type="number">
 <div class="ref">&lt; 200</div>
</div>

<div class="field">
 <label>Fasting Sugar</label>
 <input id="h6" type="number">
 <div class="ref">&lt; 120</div>
</div>

<div class="field">
 <label>ECG</label>
 <input id="h7" type="number">
 <div class="ref">0 – 2</div>
</div>

<div class="field">
 <label>Max HR</label>
 <input id="h8" type="number">
 <div class="ref">60 – 190</div>
</div>

<div class="field">
 <label>Angina</label>
 <input id="h9" type="number">
 <div class="ref">0 / 1</div>
</div>

<div class="field">
 <label>Oldpeak</label>
 <input id="h10" type="number">
 <div class="ref">0 – 4</div>
</div>

<div class="field">
 <label>Slope</label>
 <input id="h11" type="number">
 <div class="ref">0 – 2</div>
</div>

<div class="field">
 <label>CA</label>
 <input id="h12" type="number">
 <div class="ref">0 – 3</div>
</div>

<div class="field">
 <label>Thal</label>
 <input id="h13" type="number">
 <div class="ref">0 – 3</div>
</div>

<button class="check-btn" onclick="checkHeart()">
 Check
</button>

<div id="result" class="result-box"></div>

<a href="https://my.clevelandclinic.org/health/diseases/24129-heart-disease" class="know" target="_blank">
 ℹ️ Know More →
</a>

</div>

</div>

</div>

<script>

async function post(url,data){

 let r = await fetch(url,{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({features:data})
 });

 return await r.json();
}

async function checkHeart(){

 let values = [
  h1.value,h2.value,h3.value,h4.value,h5.value,
  h6.value,h7.value,h8.value,h9.value,h10.value,
  h11.value,h12.value,h13.value
 ];

 let res=document.getElementById("result");
 let blankCount = values.filter(x=>x=="").length;

 if(blankCount>4){
  res.innerText="Please fill the values";
  res.style.color="red";
  return;
 }

 let h = values.map(x=>x==""?0:Number(x));
 res.innerText="Checking...";

 let r=await post("/predict/heart",h);

 if(r.result==1){
  res.innerText="⚠️ High Risk of Heart Disease";
  res.style.color="red";
 }
 else{
  res.innerText="✅ Low Risk of Heart Disease";
  res.style.color="green";
 }
}

</script>

</body>
</html>
