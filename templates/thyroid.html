<body>

</div>

 <input id="t3" type="number">

</div>

<div class="field">

</div>

<div class="field">
 <label>Goiter</label>
 <input id="t5" type="number">
 <div class="ref">0 / 1</div>
</div>

<div class="field">
 <label>Fatigue</label>
 <input id="t6" type="number">
 <div class="ref">0 / 1</div>
</div>

<div class="field">
 <label>Weight Change</label>
 <input id="t7" type="number">
 <div class="ref">0 / 1</div>
</div>

<div class="field">
 <label>Hair Loss</label>
 <input id="t8" type="number">
 <div class="ref">0 / 1</div>
</div>

<div class="field">
 <label>Heart Rate Changes</label>
 <input id="t9" type="number">

</div>

<div class="field">

</div>

</div>

<div class="field">

 <input id="t13" type="number">
 <div class="ref">0 / 1</div>
</div>

<div class="field">

<button class="check-btn" onclick="checkThyroid()">
 Check
</button>

<div id="result" class="result-box"></div>

<a href="https://my.clevelandclinic.org/health/diseases/8541-thyroid-disease" class="know" target="_blank">
 ℹ️ Know More →
</a>

</div>

</div>

</div>

<script>

async function post(url,data){

 let r = await fetch(url,{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({features:data})
 });

 return await r.json();
}

async function checkThyroid(){

 let values = [

  t1.value, t2.value, t3.value, t4.value,
  t5.value, t6.value, t7.value, t8.value,
  t9.value, t10.value, t11.value, t12.value,
  t13.value, t14.value, t15.value, t16.value

 ];

 let res = document.getElementById("result");
 let blankCount = values.filter(x=>x=="").length;

 if(blankCount>4){
  res.innerText = "Please fill the values";
  res.style.color = "red";
  return;
 }

 let t = values.map(x=>x==""?0:Number(x));
 res.innerText = "Checking...";

 let r = await post("/predict/thyroid", t);

 if(r.result==1){
  res.innerText="⚠️ High Risk of Thyroid Disease";
  res.style.color="red";
 }
 else{
  res.innerText="✅ Low Risk of Thyroid Disease";
  res.style.color="green";
 }

}

</script>
