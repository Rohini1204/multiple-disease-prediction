<!DOCTYPE html>
<html>

<head>

 <title>Anemia Prediction</title>

 <link rel="icon" type="image/png"
      href="{{ url_for('static', filename='favicon.png') }}">

 <link rel="stylesheet"
  href="{{ url_for('static', filename='common.css') }}">

 <link rel="stylesheet"
  href="{{ url_for('static', filename='anemia.css') }}">

</head>

<body>

<div class="app">

<div class="sidebar">

 <h2>🩺 Healthcare AI</h2>

 <button onclick="location.href='/'">🏠 Home</button>
 <button onclick="location.href='/diabetes'">🩸 Diabetes</button>
 <button onclick="location.href='/heart'">❤️ Heart</button>
 <button onclick="location.href='/parkinsons'">🧠 Parkinson’s</button>
 <button onclick="location.href='/PCOS'">🌸 PCOS</button>
 <button onclick="location.href='/kidney'">🧪 Kidney</button>
 <button onclick="location.href='/liver'">🫀 Liver</button>
 <button onclick="location.href='/thyroid'">🧣 Thyroid</button>
 <button>🩹 Anemia</button>
 <button onclick="location.href='/autism'">🧩 Autism</button>
 <button onclick="location.href='/alzheimers'">🧠 Alzheimer’s</button>

</div>

<div class="main">

<h1>🩹 Anemia Prediction</h1>

<div class="card">

<div class="ref-title-wrapper">
 <div></div>
 <div></div>
 <div class="ref-title">📊 Reference Values</div>
</div>

<div class="field">
 <label>Gender (0=F, 1=M)</label>
 <input id="a1" type="number">
 <div class="ref">0 / 1</div>
</div>

<div class="field">
 <label>Hemoglobin (g/dL)</label>
 <input id="a2" type="number" step="0.1">
 <div class="ref">12 – 17</div>
</div>

<div class="field">
 <label>MCH (pg)</label>
 <input id="a3" type="number" step="0.1">
 <div class="ref">27 – 33</div>
</div>

<div class="field">
 <label>MCHC (g/dL)</label>
 <input id="a4" type="number" step="0.1">
 <div class="ref">32 – 36</div>
</div>

<div class="field">
 <label>MCV (fL)</label>
 <input id="a5" type="number">
 <div class="ref">80 – 100</div>
</div>

<button class="check-btn" onclick="checkAnemia()">
 Check
</button>

<div id="result" class="result-box"></div>

<a href="https://my.clevelandclinic.org/health/diseases/3929-anemia" class="know" target="_blank">
 ℹ️ Know More →
</a>

</div>

</div>

</div>

<script>

async function post(url,data){

 let r = await fetch(url,{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({features:data})
 });

 return await r.json();
}

async function checkAnemia(){

 let values = [
  a1.value,
  a2.value,
  a3.value,
  a4.value,
  a5.value
 ];

 let res = document.getElementById("result");
 let blankCount = values.filter(x=>x=="").length;

 if(blankCount>4){
  res.innerText = "Please fill the values";
  res.style.color = "red";
  return;
 }

 let a = values.map(x=>x==""?0:Number(x));
 res.innerText = "Checking...";

 let r = await post("/predict/anemia", a);

 if(r.result==1){
  res.innerText="⚠️ High Risk of Anemia";
  res.style.color="red";
 }
 else{
  res.innerText="✅ Low Risk of Anemia";
  res.style.color="green";
 }

}

</script>

</body>
</html>
